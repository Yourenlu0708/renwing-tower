<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>飛手端</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="飛手" />
<meta name="theme-color" content="#0B0E14" />
<link rel="apple-touch-icon" href="icon-pilot.png" />
<link rel="icon" href="icon-pilot.png" />
<style>
  :root { --bg:#0B0E14; --card:#161B26; --accent:#2FE0A8; --blue:#3B82F6; --amber:#F5A623; --red:#EF4444; --dim:#8A93A6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:#fff; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    padding:16px; padding-bottom:32px; }
  .top { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .pill { padding:6px 11px; border-radius:20px; font-size:12px; font-weight:700; display:flex; gap:5px; align-items:center; }
  .ok { background:#2FE0A826; color:var(--accent); } .no { background:#EF444426; color:var(--red); }
  .top input { background:var(--card); color:#fff; border:1px solid #ffffff22; border-radius:10px; padding:7px 10px; font-size:14px; width:110px; }
  .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .codecard { background:var(--card); border:1.5px solid #2FE0A855; border-radius:20px; padding:22px; text-align:center; margin-bottom:18px; }
  .codecard .lbl { color:var(--dim); font-size:14px; }
  .code { font-size:54px; font-weight:900; letter-spacing:14px; color:var(--accent); margin:8px 0 4px; }
  .hint { color:var(--dim); font-size:12px; }
  .cmdcard { border-radius:18px; padding:26px 18px; text-align:center; min-height:120px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    background:var(--card); border:1px solid #ffffff14; transition:.15s; }
  .cmdcard.active { background:#3B82F622; border-color:var(--blue); }
  .cmdcard.emg { background:#EF444422; border-color:var(--red); }
  .sub { color:var(--amber); font-size:14px; }
  .title { font-size:38px; font-weight:900; }
  .cd { color:var(--dim); font-size:15px; } .cd.urgent { color:var(--red); }
  .btns { display:flex; gap:12px; margin-top:18px; }
  .rbtn { flex:1; padding:20px; border-radius:14px; border:1.4px solid var(--accent); background:#2FE0A81a;
    color:#fff; font-size:19px; font-weight:800; cursor:pointer; font-family:inherit; }
  .rbtn:active { background:var(--accent); color:var(--bg); }
  .done { text-align:center; color:var(--accent); margin-top:14px; font-weight:700; min-height:22px; }
  .foot { color:var(--dim); font-size:12px; text-align:center; margin-top:22px; line-height:1.6; }
  .refresh { background:none; border:1px solid #ffffff22; color:var(--dim); border-radius:10px; padding:6px 10px; font-size:13px; cursor:pointer; }
  @keyframes pulseRed { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); } 50%{ box-shadow:0 0 0 7px rgba(239,68,68,.45); } }
  .cmdcard.pulse { animation:pulseRed .55s infinite; border-color:var(--red)!important; background:#EF444426!important; }
  #audioHint { background:#F5A62322; color:var(--amber); border:1px solid #F5A62355; border-radius:12px;
    padding:10px; text-align:center; font-size:13px; font-weight:700; margin-bottom:14px; cursor:pointer; }
  #towerBar { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid #ffffff14;
    border-radius:12px; padding:10px 14px; margin-bottom:14px; font-size:15px; }
  #towerBar.linked { border-color:#3B82F655; }
  #towerBar .tzone { font-weight:800; color:var(--blue); }
  #towerBar .tctrl { color:#fff; } #towerBar .twait { color:var(--dim); }
  .annc { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid #ffffff14;
    border-radius:12px; padding:12px 14px; margin-bottom:18px; }
  .annc label { color:var(--dim); font-size:14px; white-space:nowrap; }
  .annc input { flex:1; background:var(--bg); color:#fff; border:1px solid #ffffff22; border-radius:10px;
    padding:9px 12px; font-size:16px; min-width:0; }
</style>
  <script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
</head>
<body>
  <div id="audioHint" onclick="unlockAudio()">🔔 點一下畫面以啟用提示音（iPhone 必須）</div>
  <div class="top">
    <span class="pill no" id="netPill">雲端</span>
    <span class="right">
      <input id="name" placeholder="飛手暱稱" />
      🔋<span id="battTxt" style="font-size:13px;color:var(--accent)">—</span>
    </span>
  </div>

  <div id="towerBar"><span>🗼</span><span class="twait" id="towerTxt">尚未配對塔台</span></div>

  <div class="codecard">
    <div class="lbl">把序號告訴塔台</div>
    <div class="code" id="code">----</div>
    <div class="hint">U=上　D=下　L=左　R=右</div>
    <button class="refresh" style="margin-top:12px" onclick="regen()">換一組序號</button>
  </div>

  <div class="annc">
    <label>飛航公告</label>
    <input id="annc" placeholder="如 U1234 / NOTAM 編號" maxlength="40" />
  </div>

  <div class="cmdcard" id="cmdcard">
    <div class="sub" id="sub" style="display:none"></div>
    <div class="title" id="title">等待塔台指令</div>
    <div id="landTxt" style="display:none;color:var(--accent);font-weight:800;font-size:17px;margin-top:4px"></div>
    <div class="cd" id="cd" style="display:none"></div>
  </div>
  <div class="btns" id="btns"></div>
  <div class="done" id="done"></div>

  <div class="foot">
    這頁是「模擬遙控器小屏」的測試版：塔台下指令會顯示在這、你按下方按鈕回覆。<br/>
    之後接上 ESP32 小屏時，改用 Flutter App 即可（手機只負責橋接）。
  </div>

<script>
const $ = id => document.getElementById(id);
let code, battery = -1, lastCmdId = "", cdTimer = null;

// ── MQTT 設定（私有 HiveMQ Cloud，含帳密 + TLS）──
const BROKER = "wss://6367a24e64534d569e37bd823aac8936.s1.eu.hivemq.cloud:8884/mqtt";
const MQ_USER = "youren";
const MQ_PASS = "Z7t32tag";
const PFX = "rwtwr";
const T = {
  cmd:    c => `${PFX}/${c}/cmd`,
  reply:  c => `${PFX}/${c}/reply`,
  status: c => `${PFX}/${c}/status`,
  tower:  c => `${PFX}/${c}/tower`,
};
let client;
let urgentTimer = null, urgentLoop = null;
// 兩段回覆/降落完成警報用
let finalBtn = "", firstAck = false, finalDone = false, needCompletion = false, landingAlarmed = false;

// ── 提示音（Web Audio 即時合成，免音檔）──
let actx = null;
function ensureAudio(){
  if (!actx){ try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return; } }
  if (actx.state === "suspended") actx.resume();
}
// iOS 必須在使用者觸碰時解鎖音訊
function unlockAudio(){
  ensureAudio();
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  g.gain.value = 0.0001; o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.02);
  $("audioHint").style.display = "none";
}
document.addEventListener("pointerdown", unlockAudio);

function tone(freq, dur, type, vol){
  ensureAudio(); if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || "sine"; o.frequency.value = freq;
  o.connect(g); g.connect(actx.destination);
  const t = actx.currentTime;
  g.gain.setValueAtTime(vol || 0.3, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
// 新指令：上行雙音「叮咚」
function soundNewCase(){
  tone(880, 0.15, "sine", 0.32);
  setTimeout(() => tone(1320, 0.22, "sine", 0.32), 150);
  if (navigator.vibrate) navigator.vibrate([50, 40, 50]);
}
// 逾時未回覆：持續刺耳雙音 + 震動 + 畫面閃紅
function startUrgent(){
  stopUrgent();
  $("cmdcard").classList.add("pulse");
  const ring = () => {
    tone(1000, 0.18, "square", 0.35);
    setTimeout(() => tone(760, 0.18, "square", 0.35), 200);
    if (navigator.vibrate) navigator.vibrate(250);
  };
  ring();
  urgentLoop = setInterval(ring, 850);
}
function stopUrgent(){
  if (urgentLoop){ clearInterval(urgentLoop); urgentLoop = null; }
  $("cmdcard").classList.remove("pulse");
}
function clearReplyTimers(){
  if (urgentTimer){ clearTimeout(urgentTimer); urgentTimer = null; }
  stopUrgent();
}

// 名稱
$("name").value = localStorage.pname || "Kevin";
$("name").oninput = () => { localStorage.pname = $("name").value; reRegister(); };

// 飛航公告（飛手填、塔台看）
$("annc").value = localStorage.announce || "";
$("annc").oninput = () => { localStorage.announce = $("annc").value; sendStatus(); };

// 配對碼
function genCode(){ const d="UDLR"; let s=""; for(let i=0;i<4;i++) s+=d[Math.floor(Math.random()*4)]; return s; }
code = localStorage.pcode || (localStorage.pcode = genCode());
$("code").textContent = code;
function regen(){
  // 清掉舊配對碼的 retained 狀態，換新碼重連（LWT 要跟著新碼，需重連）
  if (client && client.connected) client.publish(T.status(code), "", {qos:1, retain:true});
  code = localStorage.pcode = genCode();
  $("code").textContent = code;
  resetCmd();
  try { client.end(true); } catch(e){}
  connect();
}

// 電量（Android Chrome 支援 getBattery；iOS Safari 不支援 → 顯示 —，可手動）
async function initBattery(){
  if (navigator.getBattery){
    try {
      const b = await navigator.getBattery();
      const upd = () => { battery = Math.round(b.level*100); $("battTxt").textContent = battery+"%"; sendStatus(); };
      upd(); b.addEventListener("levelchange", upd);
      return;
    } catch(e){}
  }
  // 不支援：讓使用者點一下手動設定，預設 95
  battery = 95; $("battTxt").textContent = battery+"%";
  $("battTxt").style.cursor = "pointer";
  $("battTxt").parentElement.onclick = () => {
    const v = prompt("此瀏覽器讀不到電量，手動輸入 0-100：", battery);
    if (v!=null){ battery = Math.max(0,Math.min(100,parseInt(v)||0)); $("battTxt").textContent = battery+"%"; sendStatus(); }
  };
}

function statusPayload(online){
  return JSON.stringify({ online, name:$("name").value, battery, gps:false, announce:$("annc").value });
}
function connect(){
  client = mqtt.connect(BROKER, {
    clientId: "pilot-"+code+"-"+Math.random().toString(16).slice(2,6),
    username: MQ_USER, password: MQ_PASS,
    clean: true, keepalive: 30, reconnectPeriod: 2000, connectTimeout: 8000,
    // 遺言：斷線時 broker 自動把我標成離線（retained），塔台立刻知道
    will: { topic: T.status(code), payload: statusPayload(false), qos: 1, retain: true },
  });
  client.on("connect", () => {
    setNet(true);
    client.subscribe(T.cmd(code), {qos:1});
    client.subscribe(T.tower(code), {qos:1});
    sendStatus();   // 上線狀態（retained）
  });
  client.on("reconnect", ()=>setNet(false));
  client.on("offline", ()=>setNet(false));
  client.on("close", ()=>setNet(false));
  client.on("error", e=>console.log("mqtt err", e&&e.message));
  client.on("message", onMqtt);
}
function setNet(on){ $("netPill").className = "pill " + (on?"ok":"no"); }
function onMqtt(topic, payload){
  let m; try{ m = JSON.parse(payload.toString()); }catch(e){ return; }
  const kind = topic.split("/")[2];
  if (kind === "cmd"){ showCmd(m); }
  else if (kind === "tower"){ setTower(m.tower, m.ctrl); }
}
// 改名也重發狀態，讓塔台看到最新名稱
function reRegister(){ sendStatus(); }
function sendStatus(){
  if (client && client.connected)
    client.publish(T.status(code), statusPayload(true), {qos:1, retain:true});
}

// 顯示「現在是哪個塔台在指揮」
function setTower(zone, ctrl){
  if (!zone && !ctrl) return;
  const bar = $("towerBar"), txt = $("towerTxt");
  bar.classList.add("linked");
  txt.className = "";
  txt.innerHTML = `塔台 <span class="tzone">${zone||""}</span> · <span class="tctrl">${ctrl||""}</span>`;
}

function showCmd(m){
  lastCmdId = m.cmdId || "";
  $("done").textContent = "";
  const emg = (m.sub||"").includes("緊急");
  const card = $("cmdcard");
  card.className = "cmdcard " + (emg?"emg":"active");
  if (m.sub){ $("sub").style.display="block"; $("sub").textContent = m.sub; $("sub").style.color = emg?"var(--red)":"var(--amber)"; }
  else $("sub").style.display="none";
  $("title").textContent = m.cmd || "";
  // 降落時間（幾點幾分）
  if (m.landAt){ $("landTxt").style.display="block"; $("landTxt").textContent = "降落時間 "+m.landAt; }
  else $("landTxt").style.display="none";
  // 倒數
  clearInterval(cdTimer);
  if (m.countdown && m.countdown>0){
    let rem = m.countdown;
    const tick = () => {
      $("cd").style.display="block";
      $("cd").className = "cd" + (rem<=10?" urgent":"");
      $("cd").textContent = "倒數 " + String(Math.floor(rem/60)).padStart(2,"0")+":"+String(rem%60).padStart(2,"0");
      // 已按收到、倒數剩 20 秒仍未按降落完成 → 警報
      if (needCompletion && firstAck && !finalDone && !landingAlarmed && rem<=20){
        landingAlarmed = true; startUrgent();
      }
      if (rem<=0) clearInterval(cdTimer);
      rem--;
    };
    tick(); cdTimer = setInterval(tick, 1000);
  } else $("cd").style.display="none";
  // 回覆按鈕 + 兩段回覆狀態
  const buttons = m.buttons || ["收到"];
  finalBtn = buttons[buttons.length-1];
  needCompletion = !!(m.countdown && m.countdown>0 && buttons.length>=2);
  firstAck = false; finalDone = false; landingAlarmed = false;
  const btns = $("btns"); btns.innerHTML="";
  buttons.forEach(label => {
    const b = document.createElement("button");
    b.className = "rbtn"; b.textContent = label;
    b.onclick = () => reply(label);
    btns.appendChild(b);
  });
  // 新案件提示音；緊急指令（立即降落）馬上響警報，其餘 10 秒未回覆才響
  clearReplyTimers();
  soundNewCase();
  if (emg) startUrgent();
  else urgentTimer = setTimeout(startUrgent, 10000);
}
function reply(label){
  if (client && client.connected)
    client.publish(T.reply(code), JSON.stringify({cmdId:lastCmdId, reply:label, ts:Date.now()}), {qos:1});
  $("done").textContent = "已回覆：" + label;
  if (navigator.vibrate) navigator.vibrate(40);
  if (label === finalBtn){            // 最終回覆（如 降落完成）→ 全部停
    finalDone = true; clearReplyTimers();
  } else if (!firstAck){              // 首次「收到」→ 停初始警示（之後 T-20 仍可再響）
    firstAck = true; clearReplyTimers();
  }
}
function resetCmd(){
  clearReplyTimers();
  clearInterval(cdTimer);
  $("cmdcard").className="cmdcard"; $("sub").style.display="none";
  $("title").textContent="等待塔台指令"; $("cd").style.display="none"; $("landTxt").style.display="none";
  $("btns").innerHTML=""; $("done").textContent="";
}

initBattery();
connect();
</script>
</body>
</html>
