<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>塔台管制</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="塔台" />
<meta name="theme-color" content="#0B0E14" />
<link rel="apple-touch-icon" href="icon-tower.png" />
<link rel="icon" href="icon-tower.png" />
<style>
  :root { --bg:#0B0E14; --card:#161B26; --accent:#2FE0A8; --blue:#3B82F6; --amber:#F5A623; --red:#EF4444; --dim:#8A93A6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:#fff; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; }
  header { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid #ffffff14; position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:19px; margin:0; letter-spacing:1px; white-space:nowrap; }
  .dot { width:12px;height:12px;border-radius:50%;background:var(--red); margin-left:auto; flex:none; }
  .dot.on { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .sync { color:var(--dim); font-size:12px; white-space:nowrap; }
  input, select { background:var(--bg); color:#fff; border:1px solid #ffffff22; border-radius:10px; padding:11px 12px; font-size:16px; font-family:inherit; }
  .idbar { display:flex; gap:10px; margin-bottom:14px; }
  .idbar input, .idbar select { flex:1; min-width:0; }
  main { padding:16px 18px; max-width:760px; margin:0 auto; }
  .addbar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
  .addbar input, .addbar select { flex:1 1 120px; min-width:0; }
  #codeIn { text-transform:uppercase; letter-spacing:3px; text-align:center; font-size:17px; }
  .addbar button { white-space:nowrap; flex:none; }
  button { cursor:pointer; border:none; border-radius:12px; font-size:15px; font-weight:700; padding:12px 16px; color:#fff; background:var(--blue); font-family:inherit; white-space:nowrap; }
  .notambar button { flex:none; }
  button.ghost { background:#ffffff14; }
  .pilot { background:var(--card); border:1px solid #ffffff14; border-radius:16px; padding:16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; cursor:pointer; }
  .pilot:hover { border-color:#ffffff33; }
  .pname { font-size:18px; font-weight:700; }
  .pilot-notam { color:var(--amber); font-size:14px; font-weight:600; }
  .pcode { color:var(--dim); font-size:12px; }
  .grow { flex:1; }
  .badge { padding:5px 11px; border-radius:20px; font-size:12px; font-weight:700; }
  .b-wait { background:#F5A62330; color:var(--amber); } .b-ok { background:#2FE0A830; color:var(--accent); }
  .batt { color:var(--accent); font-size:13px; } .batt.low { color:var(--red); }
  .empty { color:var(--dim); text-align:center; margin-top:60px; }
  .notambar { display:flex; gap:10px; margin-bottom:10px; }
  .notambar input { flex:1; letter-spacing:0; text-align:left; }
  .notambar button.ghost { background:#ffffff14; }
  .notamnow { display:none; background:#F5A62318; border:1px solid var(--amber); color:var(--amber);
              border-radius:12px; padding:11px 15px; margin-bottom:18px; font-weight:700; }
  .notamnow.show { display:block; }
  /* modal */
  .mask { position:fixed; inset:0; background:#000000aa; display:none; align-items:flex-end; justify-content:center; }
  .mask.show { display:flex; }
  .sheet { background:var(--card); width:min(560px,100%); border-radius:22px 22px 0 0; padding:22px; }
  .sheet h2 { margin:0 0 2px; font-size:20px; }
  .banner { padding:12px 16px; border-radius:12px; font-weight:600; margin:14px 0; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cmd { padding:18px 6px; border-radius:14px; text-align:center; font-weight:700; border:1.2px solid var(--blue); background:#3B82F624; }
  .cmd.emg { border-color:var(--red); background:#EF444424; color:var(--red); }
  .logpanel { margin-top:26px; background:var(--card); border:1px solid #ffffff14; border-radius:16px; padding:16px; }
  .loghead { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .logtitle { margin:0; font-size:18px; }
  .logcount { color:var(--dim); font-size:12px; margin-left:6px; }
  .loghead button { padding:8px 11px; font-size:13px; }
  .loglist { display:flex; flex-direction:column; gap:8px; max-height:390px; overflow:auto; }
  .logrow { background:var(--bg); border:1px solid #ffffff12; border-radius:11px; padding:10px 12px; }
  .logmeta { color:var(--dim); font-size:12px; display:flex; justify-content:space-between; gap:10px; }
  .logcmd { margin-top:5px; font-weight:700; }
  .logreply { margin-top:4px; color:var(--dim); font-size:12px; }
  .logreply.wait { color:var(--amber); }
  .logreply.done { color:var(--accent); }
  .logempty { color:var(--dim); font-size:13px; padding:8px 0 2px; }
  .closex { float:right; color:var(--dim); cursor:pointer; font-size:22px; line-height:1; }
</style>
  <script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
</head>
<body>
<header>
  <h1>🗼 塔台管制</h1>
  <span class="dot" id="dot"></span>
  <span class="sync" id="sync">☁ 未同步</span>
</header>
<main>
  <div class="idbar">
    <select id="duty"></select>
    <select id="savedPilot" onchange="fillSavedPilot()">
      <option value="">曾用飛手紀錄</option>
    </select>
  </div>
  <div class="addbar">
    <select id="pilotPreset" onchange="fillPilotPreset()">
      <option value="">選擇常用飛手</option>
    </select>
    <input id="codeIn" maxlength="6" placeholder="序號" />
    <input id="nameIn" maxlength="10" placeholder="飛手名字（選填）" />
    <button onclick="addPilot()">＋ 新增</button>
  </div>
  <div id="known" class="known"></div>
  <div id="list"></div>
  <div class="empty" id="empty">尚無飛手 — 輸入飛手裝置畫面上顯示的序號來配對</div>
  <section class="logpanel" aria-labelledby="logTitle">
    <div class="loghead">
      <h2 class="logtitle" id="logTitle">通聯紀錄<span class="logcount" id="logCount"></span></h2>
      <button class="ghost" onclick="exportCommLogs()">匯出 CSV</button>
    </div>
    <div class="logempty" id="logEmpty">尚無對飛手的輸出通聯紀錄</div>
    <div class="loglist" id="commLogList"></div>
  </section>
</main>

<div class="mask" id="mask">
  <div class="sheet">
    <span class="closex" onclick="closeSheet()">✕</span>
    <h2 id="sName">—</h2>
    <div class="pcode" id="sCode"></div>
    <div class="banner" id="sBanner"></div>
    <div style="color:var(--dim);font-weight:600;margin-bottom:8px">飛手名稱</div>
    <div class="notambar">
      <input id="sNameIn" maxlength="10" placeholder="飛手名字" />
      <button onclick="renameFromInput()">更新</button>
    </div>
    <div style="color:var(--dim);font-weight:600;margin:14px 0 8px">飛航公告（只給這位飛手）</div>
    <div class="notambar">
      <input id="sNotamIn" maxlength="60" placeholder="輸入飛航公告…" />
      <button onclick="setNotamFromInput()">發布</button>
      <button class="ghost" onclick="clearNotam()">清除</button>
    </div>
    <div style="color:var(--dim);font-weight:600;margin:14px 0 8px">下達指令</div>
    <div class="grid" id="sGrid"></div>
    <button class="ghost" style="width:100%;margin-top:16px;color:var(--red)" onclick="removePilot(openCode)">移除此飛手</button>
  </div>
</div>

<div class="mask" id="minMask">
  <div class="sheet" style="text-align:center">
    <span class="closex" onclick="closeMin()">✕</span>
    <h2>降落</h2>
    <div style="color:var(--dim);margin:6px 0 14px">幾分鐘後降落？</div>
    <input id="minIn" type="number" inputmode="numeric" min="1" max="120" value="5"
      oninput="updateMinHint()"
      style="width:150px;text-align:center;font-size:36px;letter-spacing:2px" />
    <div style="margin:16px 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="ghost" onclick="setMin(3)">3 分</button>
      <button class="ghost" onclick="setMin(5)">5 分</button>
      <button class="ghost" onclick="setMin(10)">10 分</button>
      <button class="ghost" onclick="setMin(15)">15 分</button>
    </div>
    <div id="minHint" style="color:var(--accent);font-size:20px;font-weight:800;margin-bottom:14px;min-height:26px"></div>
    <button onclick="confirmMin()" style="width:100%">送出降落指令</button>
  </div>
</div>

<div class="mask" id="timeMask">
  <div class="sheet" style="text-align:center">
    <span class="closex" onclick="closeTime()">✕</span>
    <h2>可能空檔</h2>
    <div style="color:var(--dim);margin:6px 0 14px">預計可能有空檔的時間</div>
    <input id="timeIn" type="time" style="font-size:30px;padding:8px 14px;text-align:center" />
    <div style="margin:16px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="ghost" onclick="setTimeQuick(0)">現在</button>
      <button class="ghost" onclick="setTimeQuick(15)">+15 分</button>
      <button class="ghost" onclick="setTimeQuick(30)">+30 分</button>
      <button class="ghost" onclick="setTimeQuick(60)">+60 分</button>
    </div>
    <button onclick="confirmTime()" style="width:100%">送出</button>
  </div>
</div>

<div class="mask" id="txtMask">
  <div class="sheet">
    <span class="closex" onclick="closeText()">✕</span>
    <h2>其他訊息</h2>
    <div style="color:var(--dim);margin:6px 0 12px">自訂要傳給飛手的文字</div>
    <input id="txtIn" maxlength="40" placeholder="輸入訊息…"
      style="width:100%;font-size:18px;padding:12px;margin-bottom:12px" />
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button class="ghost" onclick="setTxt('風速增強，注意')">風速增強</button>
      <button class="ghost" onclick="setTxt('注意鳥群')">注意鳥群</button>
      <button class="ghost" onclick="setTxt('場地淨空')">場地淨空</button>
      <button class="ghost" onclick="setTxt('暫停起飛')">暫停起飛</button>
      <button class="ghost" onclick="setTxt('可以收機')">可以收機</button>
    </div>
    <button onclick="confirmText()" style="width:100%">送出</button>
  </div>
</div>

<script>
const PRESETS = [
  {cmd:"開機預備", sub:"塔台指令", buttons:["收到"]},
  {cmd:"連續進場", sub:"塔台指令", buttons:["收到"]},
  {cmd:"可以起飛", sub:"塔台指令", buttons:["收到","已起飛"]},
  {cmd:"可能空檔", sub:"塔台指令", buttons:["收到"], needsTime:true},
  {cmd:"降落", sub:"塔台指令", buttons:["收到","降落完成"], needsMinutes:true},
  {cmd:"立即降落", sub:"⚠ 緊急", buttons:["收到"], emergency:true},
  {cmd:"其他", sub:"塔台訊息", buttons:["收到"], needsText:true},
];
const pilots = {};   // code -> state（目前顯示中的飛手）
let openCode = null, seq = 0, client;

// ── MQTT 設定（私有 HiveMQ Cloud，含帳密 + TLS）──
const BROKER = "wss://6367a24e64534d569e37bd823aac8936.s1.eu.hivemq.cloud:8884/mqtt";
const MQ_USER = "youren";
const MQ_PASS = "Z7t32tag";
const PFX = "rwtwr";  // topic 前綴
const T = {
  cmd:    c => `${PFX}/${c}/cmd`,
  reply:  c => `${PFX}/${c}/reply`,
  status: c => `${PFX}/${c}/status`,
  tower:  c => `${PFX}/${c}/tower`,
  ack:    c => `${PFX}/${c}/ack`,    // 塔台→飛手：確認收到回覆
  ping:   c => `${PFX}/${c}/ping`,   // 飛手→塔台：延遲量測
  pong:   c => `${PFX}/${c}/pong`,   // 塔台→飛手：回應
  notam:  c => `${PFX}/${c}/notam`,  // 塔台→飛手：飛航公告（retained 常駐，一對一）
  staff:  id => `${PFX}/staff/${id}/registry`, // 塔台人員名冊（retained）
};
const $ = id => document.getElementById(id);

// ── 塔台人員資料庫（值班管制員）──
// 之後要加人只要在 ROSTER 加一筆；每位人員的飛手紀錄會分開保存在瀏覽器。
const ROSTER = [
  { id: "south-cai", tower: "南塔", name: "蔡佩勲" },
]; 

// 常用飛手名冊；選取後會自動帶入序號與姓名，仍可手動修改。
const PILOT_ROSTER = [
  { code: "NSR8U", name: "盧宥任" },
];

const MAX_COMM_LOGS = 500;
const STAFF_DB_KEY = "towerStaffDbV1";
const safeJSON = (raw, fallback) => {
  try { return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
};
let staffDb = safeJSON(localStorage.getItem(STAFF_DB_KEY), { personnel: {} });
if (!staffDb || typeof staffDb !== "object") staffDb = { personnel: {} };
if (!staffDb.personnel || typeof staffDb.personnel !== "object") staffDb.personnel = {};

let names = {};    // 目前值班人員的 code -> 飛手名稱
let notams = {};   // 目前值班人員的 code -> 公告文字
let savedPilots = {}; // 目前值班人員曾加入過的飛手
let commLogs = []; // 目前值班人員的對飛手輸出通聯紀錄
let duty = safeJSON(localStorage.duty, { tower: "", name: "" });
let staffSyncReady = false;
let staffSyncTimer = null;
let staffRefreshTimer = null;
let staffLocalDirty = false;
let lastPublishedStaffPayload = "";

const staffKey = d => `${d.tower || ""}::${d.name || ""}`;
function staffRecord(create = true) {
  if (!duty.tower || !duty.name) return null;
  const key = staffKey(duty);
  if (!staffDb.personnel[key] && create) {
    staffDb.personnel[key] = {
      tower: duty.tower,
      name: duty.name,
      activeCodes: [],
      names: {},
      notams: {},
      savedPilots: {},
      commLogs: [],
    };
  }
  return staffDb.personnel[key] || null;
}

// 舊版是所有塔台共用一份 localStorage；第一次升級時轉入目前值班人員名下。
function migrateLegacy(record) {
  if (!record || localStorage.towerStaffDbMigratedV1 === "1") return;
  const oldCodes = safeJSON(localStorage.pilotCodes, []);
  const oldNames = safeJSON(localStorage.names, {});
  const oldNotams = safeJSON(localStorage.notams, {});
  if (Array.isArray(oldCodes)) record.activeCodes = [...new Set(oldCodes)];
  record.names = { ...oldNames, ...(record.names || {}) };
  record.notams = { ...oldNotams, ...(record.notams || {}) };
  record.savedPilots = record.savedPilots || {};
  record.commLogs = Array.isArray(record.commLogs) ? record.commLogs : [];
  for (const code of record.activeCodes) {
    record.savedPilots[code] = {
      code,
      name: record.names[code] || "",
      lastUsed: Date.now(),
    };
  }
  localStorage.towerStaffDbMigratedV1 = "1";
}

function persistStaff() {
  const publish = arguments.length === 0 || arguments[0]?.publish !== false;
  const record = staffRecord();
  if (!record) return;
  record.activeCodes = Object.keys(pilots);
  record.names = { ...names };
  record.notams = { ...notams };
  record.savedPilots = { ...savedPilots };
  record.commLogs = commLogs.slice(-MAX_COMM_LOGS);
  localStorage.setItem(STAFF_DB_KEY, JSON.stringify(staffDb));
  if (publish) {
    if (staffSyncReady) publishStaffRecord();
    else staffLocalDirty = true;
  }
}

function staffRegistryTopic() {
  if (!duty.tower || !duty.name) return "";
  const id = duty.id || encodeURIComponent(staffKey(duty));
  return T.staff(id);
}

function staffPayload() {
  return JSON.stringify({
    version: 1,
    staffId: duty.id || staffKey(duty),
    tower: duty.tower,
    name: duty.name,
    savedPilots,
    names,
    notams,
    commLogs: commLogs.slice(-MAX_COMM_LOGS),
  });
}

function setSyncState(text) {
  const el = $("sync");
  if (el) el.textContent = text;
}

function publishStaffRecord() {
  const topic = staffRegistryTopic();
  if (!topic || !client || !client.connected || !staffSyncReady) return;
  const payload = staffPayload();
  if (payload === lastPublishedStaffPayload) return;
  lastPublishedStaffPayload = payload;
  client.publish(topic, payload, { qos: 1, retain: true });
  staffLocalDirty = false;
  setSyncState("☁ 已同步");
}

function mergeRemoteStaff(payload) {
  const remote = safeJSON(payload, null);
  if (!remote || remote.version !== 1) return;
  const expected = duty.id || staffKey(duty);
  if (remote.staffId !== expected) return;

  staffSyncReady = true;
  staffLocalDirty = false;
  if (staffSyncTimer) { clearTimeout(staffSyncTimer); staffSyncTimer = null; }

  for (const [code, item] of Object.entries(remote.savedPilots || {})) {
    if (!item || !item.code) continue;
    const local = savedPilots[code];
    if (!local || (item.lastUsed || 0) >= (local.lastUsed || 0)) {
      savedPilots[code] = item;
    }
  }
  for (const [code, nm] of Object.entries(remote.names || {})) {
    if (!names[code]) names[code] = nm;
  }
  for (const [code, text] of Object.entries(remote.notams || {})) {
    if (!Object.prototype.hasOwnProperty.call(notams, code)) notams[code] = text;
  }
  const mergedLogs = new Map(commLogs.map(item => [item.id, item]));
  for (const item of Array.isArray(remote.commLogs) ? remote.commLogs : []) {
    if (!item || !item.id) continue;
    const local = mergedLogs.get(item.id);
    if (!local || (item.updatedAt || item.time || 0) >= (local.updatedAt || local.time || 0)) {
      mergedLogs.set(item.id, item);
    }
  }
  commLogs = Array.from(mergedLogs.values())
    .sort((a, b) => (a.time || 0) - (b.time || 0))
    .slice(-MAX_COMM_LOGS);

  persistStaff({ publish: false });
  refreshSavedPilots();
  render();
  setSyncState("☁ 已同步");
  // 合併後回寫一次；相同內容也重新發布，刷新 Serverless retained 保存期限。
  // publishStaffRecord 會以 payload 去重，因此不會形成循環發布。
  publishStaffRecord();
}

function beginStaffSync() {
  staffSyncReady = false;
  staffLocalDirty = false;
  lastPublishedStaffPayload = "";
  const topic = staffRegistryTopic();
  if (!topic || !client || !client.connected) return;
  setSyncState("☁ 同步中…");
  client.subscribe(topic, { qos: 1 });
  if (staffSyncTimer) clearTimeout(staffSyncTimer);
  if (staffRefreshTimer) clearInterval(staffRefreshTimer);
  // 沒有 retained 名冊時，等待短暫時間後建立第一份雲端名冊。
  staffSyncTimer = setTimeout(() => {
    staffSyncTimer = null;
    staffSyncReady = true;
    publishStaffRecord();
  }, 1500);
  // Serverless retained 名冊可能有保存期限；頁面長時間開啟時定期刷新。
  staffRefreshTimer = setInterval(() => {
    if (staffSyncReady) publishStaffRecord();
  }, 48 * 60 * 60 * 1000);
}

function rememberPilot(code, name = "") {
  if (!code) return;
  const old = savedPilots[code] || {};
  savedPilots[code] = {
    code,
    name: name || names[code] || old.name || "",
    lastUsed: Date.now(),
  };
  refreshSavedPilots();
}

function refreshSavedPilots() {
  const sel = $("savedPilot");
  if (!sel) return;
  sel.innerHTML = '<option value="">曾用飛手紀錄</option>';
  const rows = Object.values(savedPilots)
    .filter(p => p && p.code)
    .sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
  for (const p of rows) {
    const option = document.createElement("option");
    option.value = p.code;
    option.textContent = `${p.name ? p.name + "・" : ""}${p.code}`;
    sel.appendChild(option);
  }
  sel.disabled = rows.length === 0;
}

function fillSavedPilot() {
  const sel = $("savedPilot");
  const p = savedPilots[sel.value];
  if (!p) return;
  $("codeIn").value = p.code;
  $("nameIn").value = p.name || names[p.code] || "";
  sel.value = "";
}

function initPilotRoster() {
  const sel = $("pilotPreset");
  if (!sel) return;
  sel.innerHTML = '<option value="">選擇常用飛手</option>' +
    PILOT_ROSTER.map(p => `<option value="${p.code}">${p.code}・${p.name}</option>`).join("");
}

function fillPilotPreset() {
  const sel = $("pilotPreset");
  const p = PILOT_ROSTER.find(item => item.code === sel.value);
  if (!p) return;
  $("codeIn").value = p.code;
  $("nameIn").value = p.name;
}

function unsubscribeAllPilots() {
  if (!client || !client.connected) return;
  for (const code of Object.keys(pilots)) {
    client.unsubscribe(T.reply(code));
    client.unsubscribe(T.status(code));
    client.unsubscribe(T.ping(code));
  }
}

function loadDutyData() {
  for (const code of Object.keys(pilots)) delete pilots[code];
  names = {}; notams = {}; savedPilots = {}; commLogs = [];
  const record = staffRecord();
  if (record) {
    migrateLegacy(record);
    names = { ...(record.names || {}) };
    notams = { ...(record.notams || {}) };
    savedPilots = { ...(record.savedPilots || {}) };
    commLogs = (Array.isArray(record.commLogs) ? record.commLogs : [])
      .sort((a, b) => (a.time || 0) - (b.time || 0))
      .slice(-MAX_COMM_LOGS);
    for (const code of record.activeCodes || []) {
      pilots[code] = { code, replyState: "idle", lastCmd: "" };
      if (!savedPilots[code]) rememberPilot(code, names[code] || "");
    }
    persistStaff();
  }
  refreshSavedPilots();
  if (client && client.connected) resubAll();
  render();
}

function switchDuty(nextDuty) {
  unsubscribeAllPilots();
  const oldTopic = staffRegistryTopic();
  if (client && client.connected && oldTopic) client.unsubscribe(oldTopic);
  staffSyncReady = false;
  duty = nextDuty;
  localStorage.duty = JSON.stringify(duty);
  loadDutyData();
  beginStaffSync();
  reRegister();
}

(function initDuty() {
  const sel = $("duty");
  sel.innerHTML = '<option value="">選擇值班管制員</option>' +
    ROSTER.map((r, i) => `<option value="${i}">${r.tower}・${r.name}</option>`).join("");
  let idx = ROSTER.findIndex(r => r.tower === duty.tower && r.name === duty.name);
  // 目前只有一位時直接預選；之後新增人員仍會記住上次值班者。
  if (idx < 0 && ROSTER.length) {
    idx = 0;
    duty = { ...ROSTER[0] };
    localStorage.duty = JSON.stringify(duty);
  } else if (idx >= 0) {
    // 舊版只保存 tower/name；升級後補上穩定 id，確保跨裝置使用同一個雲端 Topic。
    duty = { ...ROSTER[idx] };
    localStorage.duty = JSON.stringify(duty);
  }
  sel.value = idx >= 0 ? String(idx) : "";
  sel.onchange = () => {
    const next = sel.value === "" ? { tower: "", name: "" } : { ...ROSTER[Number(sel.value)] };
    switchDuty(next);
  };
})();

// 顯示名：塔台自訂名 > 序號
const displayName = p => names[p.code] || p.code;
function setName(code, nm) {
  if (nm) names[code] = nm; else delete names[code];
  rememberPilot(code, nm);
  persistStaff();
  render();
}
function renameFromInput() {
  if (!openCode) return;
  setName(openCode, $("sNameIn").value.trim());
}

function connect() {
  client = mqtt.connect(BROKER, {
    clientId: "tower-" + Math.random().toString(16).slice(2, 10),
    username: MQ_USER, password: MQ_PASS,
    clean: true, keepalive: 30, reconnectPeriod: 2000, connectTimeout: 8000,
  });
  client.on("connect", () => { $("dot").classList.add("on"); beginStaffSync(); resubAll(); });
  client.on("reconnect", () => { $("dot").classList.remove("on"); setSyncState("☁ 重新連線…"); });
  client.on("offline", () => { $("dot").classList.remove("on"); setSyncState("☁ 未連線"); });
  client.on("close", () => { $("dot").classList.remove("on"); setSyncState("☁ 未連線"); });
  client.on("error", e => console.log("mqtt err", e && e.message));
  client.on("message", onMqtt);
}
// 重連後重新訂閱所有飛手 + 重發塔台身分（retained）
function resubAll() {
  for (const code of Object.keys(pilots)) subscribePilot(code);
}
function subscribePilot(code) {
  client.subscribe(T.reply(code), { qos: 1 });
  client.subscribe(T.status(code), { qos: 1 });
  client.subscribe(T.ping(code), { qos: 0 });   // ③ 延遲量測
  publishTower(code);
  publishNotam(code);                            // 補送目前公告給這台
}

// ── 飛航公告（一對一）──
function publishNotam(code) {
  if (!client || !client.connected) return;
  const txt = notams[code] || "";
  client.publish(T.notam(code), JSON.stringify({ text: txt }), { qos: 1, retain: true });
}
function setNotam(code, txt) {
  notams[code] = txt;
  publishNotam(code);
  addCommLog(
    pilots[code],
    txt ? "飛航公告：" + txt : "清除飛航公告",
    "飛航公告",
    "",
    "已送出",
  );
  persistStaff();
  render();
}
function setNotamFromInput() {
  if (!openCode) return;
  setNotam(openCode, $("sNotamIn").value.trim());
}
function clearNotam() {
  if (!openCode) return;
  $("sNotamIn").value = "";
  setNotam(openCode, "");
}

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[ch]));
}

function logTime(ts) {
  if (!ts) return "—";
  return new Intl.DateTimeFormat("zh-TW", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
  }).format(new Date(ts));
}

function trimCommLogs() {
  commLogs = commLogs
    .filter(item => item && item.id && item.code && item.command)
    .sort((a, b) => (a.time || 0) - (b.time || 0))
    .slice(-MAX_COMM_LOGS);
}

function addCommLog(p, command, category, cmdId = "", status = "等待回覆") {
  if (!p || !p.code || !command) return null;
  const now = Date.now();
  const log = {
    id: cmdId || `log-${now}-${seq++}`,
    cmdId: cmdId || "",
    time: now,
    updatedAt: now,
    tower: duty.tower,
    staffName: duty.name,
    code: p.code,
    pilotName: displayName(p),
    category: category || "塔台通訊",
    command: String(command),
    reply: "",
    replyAt: 0,
    status,
  };
  commLogs.push(log);
  trimCommLogs();
  return log;
}

function updateCommLogReply(code, message) {
  const cmdId = message && message.cmdId;
  let log = cmdId ? commLogs.find(item => item.cmdId === cmdId) : null;
  if (!log) {
    log = [...commLogs].reverse().find(item => item.code === code && item.status === "等待回覆");
  }
  if (!log) return;
  log.reply = String(message && message.reply ? message.reply : "已回應");
  log.replyAt = Date.now();
  log.updatedAt = log.replyAt;
  log.status = "已回覆";
  persistStaff();
}

function renderCommLogs() {
  const list = $("commLogList");
  const empty = $("logEmpty");
  const count = $("logCount");
  if (!list || !empty || !count) return;
  trimCommLogs();
  const rows = [...commLogs].reverse().slice(0, 100);
  count.textContent = commLogs.length ? `（共 ${commLogs.length} 筆，顯示最近 ${rows.length} 筆）` : "";
  empty.style.display = rows.length ? "none" : "block";
  list.innerHTML = rows.map(log => {
    const statusClass = log.status === "等待回覆" ? "wait" : "done";
    const replyText = log.reply
      ? `回覆：${escapeHtml(log.reply)}${log.replyAt ? " · " + escapeHtml(logTime(log.replyAt)) : ""}`
      : escapeHtml(log.status || "已送出");
    return `<div class="logrow">
      <div class="logmeta"><span>${escapeHtml(logTime(log.time))}</span><span>${escapeHtml(log.category || "塔台通訊")}</span></div>
      <div class="logcmd">→ ${escapeHtml(log.pilotName || log.code)}（${escapeHtml(log.code)}）：${escapeHtml(log.command)}</div>
      <div class="logreply ${statusClass}">${replyText}</div>
    </div>`;
  }).join("");
}

function exportCommLogs() {
  if (!commLogs.length) {
    alert("目前沒有通聯紀錄可匯出");
    return;
  }
  const cell = value => `"${String(value == null ? "" : value).replace(/"/g, '""')}"`;
  const rows = [
    ["時間", "塔台", "塔台人員", "飛手", "序號", "分類", "輸出通聯", "回覆", "狀態", "回覆時間"],
    ...[...commLogs].sort((a, b) => (a.time || 0) - (b.time || 0)).map(log => [
      logTime(log.time), log.tower, log.staffName, log.pilotName, log.code,
      log.category, log.command, log.reply, log.status, log.replyAt ? logTime(log.replyAt) : "",
    ]),
  ];
  const csv = "\uFEFF" + rows.map(row => row.map(cell).join(",")).join("\r\n");
  const url = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
  const link = document.createElement("a");
  link.href = url;
  link.download = `tower-comm-log-${duty.id || "staff"}-${new Date().toISOString().slice(0, 10)}.csv`;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

function publishTower(code) {
  if (!client || !client.connected) return;
  client.publish(T.tower(code),
    JSON.stringify({ tower: duty.tower, ctrl: duty.name }),
    { qos: 1, retain: true });
}
// 塔台改名 → 重發身分給所有飛手
function reRegister() {
  for (const code of Object.keys(pilots)) publishTower(code);
}

function onMqtt(topic, payload) {
  let m; try { m = JSON.parse(payload.toString()); } catch (e) { return; }
  if (topic === staffRegistryTopic()) {
    mergeRemoteStaff(payload.toString());
    return;
  }
  const parts = topic.split("/");        // rwtwr/{code}/{kind}
  const code = parts[1], kind = parts[2];
  const p = pilots[code]; if (!p) return;
  if (kind === "status") { Object.assign(p, m); render(); }
  else if (kind === "reply") {
    p.lastReply = m.reply; p.replyState = "responded";
    updateCommLogReply(code, m);
    render();
    // ② 端到端確認：塔台收到回覆 → 立刻回 ack，讓飛手小屏打勾
    client.publish(T.ack(code), JSON.stringify({ cmdId: m.cmdId || "", reply: m.reply }), { qos: 1 });
  }
  else if (kind === "ping") {
    // ③ 回 pong（原封帶回時間戳），飛手據此算往返延遲
    client.publish(T.pong(code), JSON.stringify({ t: m.t }), { qos: 0 });
  }
}

function addPilot() {
  if (!duty.tower || !duty.name) {
    alert("請先選擇值班管制員");
    return;
  }
  const code = $("codeIn").value.toUpperCase().trim();
  if (code.length < 3) return;
  const nm = $("nameIn").value.trim();
  if (nm) names[code] = nm;
  pilots[code] = pilots[code] || {code, replyState:"idle", lastCmd:""};
  rememberPilot(code, nm);
  persistStaff();
  if (client && client.connected) subscribePilot(code);
  $("pilotPreset").value = "";
  $("codeIn").value = ""; $("nameIn").value = "";
  render();
}

function removePilot(code) {
  if (!code || !confirm("確定移除這位飛手？")) return;
  if (client && client.connected) {
    client.unsubscribe(T.reply(code));
    client.unsubscribe(T.status(code));
    client.unsubscribe(T.ping(code));
  }
  delete pilots[code];
  // 只從本次值班名單移除；曾用紀錄保留在下拉選單，之後可直接帶入。
  persistStaff();
  refreshSavedPilots();
  closeSheet();
  render();
}

function render() {
  const list = $("list"); list.innerHTML = "";
  const arr = Object.values(pilots);
  $("empty").style.display = arr.length ? "none" : "block";
  for (const p of arr) {
    const div = document.createElement("div");
    div.className = "pilot";
    div.onclick = () => openSheet(p.code);
      div.innerHTML = `
      <span class="dot ${p.online?"on":""}"></span>
      <div class="grow">
        <div class="pname">${displayName(p)}${notams[p.code] ? ` <span class="pilot-notam">（${notams[p.code]}）</span>` : ""}</div>
        <div class="pcode">序號 ${p.code}${p.announce ? ` ・ 公告 <span style="color:var(--accent)">${p.announce}</span>` : ""}</div>
      </div>
      ${cdHtml(p)}
      ${stateBadge(p)}
      ${battHtml(p.battery)}`;
    list.appendChild(div);
  }
  if (openCode) refreshSheet();
  renderCommLogs();
}
function stateBadge(p){
  if (p.replyState==="waiting") return `<span class="badge b-wait">等待回應</span>`;
  if (p.replyState==="responded") return `<span class="badge b-ok">${p.lastReply||"已回應"}</span>`;
  return "";
}
function battHtml(b){
  if (b==null || b<0) return "";
  return `<span class="batt ${b<=30?"low":""}">🔋${b}%</span>`;
}

function openSheet(code){ openCode = code; $("mask").classList.add("show"); refreshSheet(); }
function closeSheet(){ openCode = null; $("mask").classList.remove("show"); }
function refreshSheet(){
  const p = pilots[openCode]; if (!p) return;
  $("sName").textContent = displayName(p);
  $("sNameIn").value = names[openCode] || "";       // 帶出目前名字
  $("sCode").innerHTML = "序號 " + p.code + (p.online?" · 線上":" · 離線")
    + (p.announce ? ' · 公告 <span style="color:var(--accent)">'+p.announce+'</span>' : "");
  const b = $("sBanner");
  if (p.replyState==="waiting"){ b.style.background="#F5A62322"; b.style.color="var(--amber)"; b.innerHTML="等待回應…（"+p.lastCmd+"） "+cdHtml(p); }
  else if (p.replyState==="responded"){ b.style.background="#2FE0A822"; b.style.color="var(--accent)"; b.textContent="已回應："+(p.lastReply||""); }
  else { b.style.background="#ffffff10"; b.style.color="var(--dim)"; b.textContent="尚未下達指令"; }
  $("sNotamIn").value = notams[openCode] || "";   // 帶出這位飛手目前的公告
  const g = $("sGrid"); g.innerHTML="";
  for (const pr of PRESETS){
    const d = document.createElement("div");
    d.className = "cmd" + (pr.emergency?" emg":"");
    d.textContent = pr.cmd;
    d.onclick = () => sendCmd(p, pr);
    g.appendChild(d);
  }
}
function suggestTime(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function clockAfter(min){ const d=new Date(Date.now()+min*60000); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

function sendCmd(p, pr){
  if (pr.needsMinutes){ openMin(p, pr); return; }   // 降落 → 數字鍵盤
  if (pr.needsTime){ openTime(p, pr); return; }      // 可能空檔 → 時間選擇
  if (pr.needsText){ openText(p, pr); return; }      // 其他 → 文字輸入
  dispatch(p, pr, pr.cmd, pr.countdown||0, "");
}

// ── 可能空檔：時間選擇彈窗 ──
let timeTarget = null;
function openTime(p, pr){ timeTarget={p,pr}; setTimeQuick(15); $("timeMask").classList.add("show"); }
function closeTime(){ $("timeMask").classList.remove("show"); timeTarget=null; }
function setTimeQuick(min){ $("timeIn").value = clockAfter(min); }
function confirmTime(){
  if(!timeTarget) return;
  const t = $("timeIn").value;
  if(!t) return;
  const {p,pr} = timeTarget;
  dispatch(p, pr, "可能空檔 " + t, 0, "");
  closeTime();
}

// ── 其他：自訂訊息彈窗 ──
let txtTarget = null;
function openText(p, pr){ txtTarget={p,pr}; $("txtIn").value=""; $("txtMask").classList.add("show"); setTimeout(()=>$("txtIn").focus(),50); }
function closeText(){ $("txtMask").classList.remove("show"); txtTarget=null; }
function setTxt(s){ $("txtIn").value=s; }
function confirmText(){
  if(!txtTarget) return;
  const s = $("txtIn").value.trim();
  if(!s) return;
  const {p,pr} = txtTarget;
  dispatch(p, pr, s, 0, "");
  closeText();
}

function dispatch(p, pr, cmd, countdown, landAt){
  const id = "c-" + Date.now() + "-" + (seq++);
  // QoS 1：保證送達飛手小屏
  client.publish(T.cmd(p.code),
    JSON.stringify({cmdId:id, cmd, sub:pr.sub, buttons:pr.buttons, countdown, landAt}),
    {qos:1});
  addCommLog(p, cmd, pr.sub, id, "等待回覆");
  persistStaff();
  p.lastCmd = cmd; p.replyState = "waiting"; p.lastReply = "";
  p.cdEnd = countdown>0 ? Date.now()+countdown*1000 : 0;
  p.landAt = landAt || "";
  render();
}

// ── 降落分鐘數彈窗 ──
let minTarget = null;
function openMin(p, pr){ minTarget={p,pr}; $("minIn").value="5"; updateMinHint(); $("minMask").classList.add("show"); setTimeout(()=>$("minIn").focus(),50); }
function closeMin(){ $("minMask").classList.remove("show"); minTarget=null; }
function setMin(n){ $("minIn").value=n; updateMinHint(); }
function updateMinHint(){
  const n = parseInt($("minIn").value);
  $("minHint").textContent = (n>0) ? ("預計 "+clockAfter(n)+" 降落") : "";
}
function confirmMin(){
  if(!minTarget) return;
  const n = parseInt($("minIn").value);
  if(!(n>0)){ $("minHint").textContent="請輸入大於 0 的分鐘數"; return; }
  const {p,pr} = minTarget;
  dispatch(p, pr, pr.cmd, n*60, clockAfter(n));
  closeMin();
}

// ── 倒數顯示（塔台端）──
function cdHtml(p){
  if(!p.cdEnd) return "";
  const rem = Math.round((p.cdEnd-Date.now())/1000);
  if(rem < -2) return "";
  const r = Math.max(0, rem);
  const mm=String(Math.floor(r/60)).padStart(2,"0"), ss=String(r%60).padStart(2,"0");
  return `<span class="badge" style="background:#3B82F633;color:var(--blue)">⏱ ${mm}:${ss}${p.landAt?(" → "+p.landAt):""}</span>`;
}
setInterval(()=>{ if(Object.values(pilots).some(p=>p.cdEnd && Date.now()<p.cdEnd+2000)) render(); }, 1000);

// 載入目前值班人員自己的飛手名單與曾用紀錄。
initPilotRoster();
loadDutyData();
connect();
</script>
